<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gerador de Arte • Rádio Amizade</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:ital,wght@0,700;1,700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#0b0b0c;color:#fff;font-family:Roboto}
.app{display:grid;grid-template-columns:420px 1fr;gap:20px;padding:24px}
.panel{background:#121316;padding:16px;border-radius:12px}
.field{margin-bottom:12px}
.input,.textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#111;color:#fff}
.textarea{min-height:100px}
.btns{display:flex;gap:10px;margin-top:10px}
button{padding:10px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#FFD400;color:#000}
canvas{max-width:100%}
</style>
</head>

<body>

<div class="app">

  <section class="panel">
    
    <div class="field">
      <input id="upload" type="file">
    </div>

    <div class="field">
      <input id="destaque" class="input" value="NOTÍCIA">
    </div>

    <div class="field">
      <textarea id="manchete" class="textarea"></textarea>
    </div>

    <div class="btns">
      <button id="download" class="primary">Baixar 1</button>
    </div>

  </section>

  <section>
    <canvas id="canvas" width="1080" height="1350"></canvas>
  </section>

</div>

<script>
const CONFIG = {
  BOTTOM_MARGIN: 120,
  GAP_BETWEEN_BOX_AND_TEXT: 36,
  VARIANT_OFFSET_Y: 100
};

const OVERLAY_DEFAULT = 'overlay.png';
const OVERLAY_ALT = 'overlay-alt.png';

let overlayDefaultImg = null;
let overlayAltImg = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const els = {
  upload: document.getElementById("upload"),
  destaque: document.getElementById("destaque"),
  manchete: document.getElementById("manchete"),
  download: document.getElementById("download")
};

let bgImg = null;

// ===== LOAD IMAGE =====
function loadImage(url){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>res(img);
    img.src = url;
  });
}

// ===== UPLOAD =====
els.upload.addEventListener("change", async ()=>{
  const file = els.upload.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);
  bgImg = await loadImage(url);
  render();
});

// ===== WRAP TEXT =====
function wrapText(text, maxWidth){
  const words = text.split(" ");
  let line = "";
  let lines = [];

  for(const word of words){
    const test = line + word + " ";
    if(ctx.measureText(test).width > maxWidth){
      lines.push(line);
      line = word + " ";
    }else{
      line = test;
    }
  }

  lines.push(line);
  return lines;
}

// ===== RENDER =====
async function render(variant = "default"){

  const W = 1080, H = 1350;
  ctx.clearRect(0,0,W,H);

  // fundo
  if(bgImg){
    ctx.drawImage(bgImg,0,0,W,H);
  }else{
    ctx.fillStyle="#333";
    ctx.fillRect(0,0,W,H);
  }

  // overlay
  const overlay = variant === "alt" ? overlayAltImg : overlayDefaultImg;
  if(overlay) ctx.drawImage(overlay,0,0,W,H);

  const OFFSET_Y = variant === "alt" ? CONFIG.VARIANT_OFFSET_Y : 0;

  // texto
  ctx.fillStyle="#fff";
  ctx.font="bold italic 64px Roboto";

  const lines = wrapText(els.manchete.value, 900).slice(0,5);

  let y = H - CONFIG.BOTTOM_MARGIN - (lines.length * 70);
  y -= OFFSET_Y;

  for(const line of lines){
    ctx.fillText(line,80,y);
    y+=70;
  }

  // badge
  ctx.fillStyle="#FFD400";
  ctx.fillRect(0,y-200,400,80);

  ctx.fillStyle="#000";
  ctx.font="64px Bebas Neue";
  ctx.fillText(els.destaque.value,80,y-140);
}

// ===== DOWNLOAD 1 =====
els.download.onclick = ()=>{
  const link = document.createElement("a");
  link.href = canvas.toDataURL();
  link.download = "arte.png";
  link.click();
};

// ===== DOWNLOAD 2 =====
async function gerarDuas(){

  await render("default");
  const img1 = canvas.toDataURL();
  download(img1,"arte-normal.png");

  await render("alt");
  const img2 = canvas.toDataURL();
  download(img2,"arte-alt.png");
}

function download(data,name){
  const a = document.createElement("a");
  a.href = data;
  a.download = name;
  a.click();
}

// botão extra
const btn = document.createElement("button");
btn.textContent = "Baixar 2 versões";
btn.onclick = gerarDuas;
document.querySelector(".btns").appendChild(btn);

// ===== BOOT =====
(async ()=>{
  overlayDefaultImg = await loadImage(OVERLAY_DEFAULT);
  overlayAltImg = await loadImage(OVERLAY_ALT);
  render();
})();
</script>

</body>
</html>
